name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Core smoke test (no dependencies)
        run: python tests_demo.py

      - name: Install Sage and cross-validate rules engine
        run: |
          python -m pip install --upgrade pip
          pip install bgsage
          python validate_sage.py
