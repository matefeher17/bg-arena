name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Core smoke test (no dependencies)
        run: python tests_demo.py

      - name: Install Sage and cross-validate rules engine
        run: |
          python -m pip install --upgrade pip
          pip install bgsage
          python validate_sage.py

  gnubg-probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bgarena (core, no bgsage)
        run: pip install -e .

      - name: Install gnubg
        run: sudo apt-get install -y gnubg

      - name: Run probe
        run: python scripts/gnubg_probe.py

  gnubg:
    # Separate job: gnubg is an external program with its own install + a
    # headless launch that can be finicky in CI, so it must not break the
    # stdlib/Sage matrix. continue-on-error keeps the build green while the
    # adapter is still quarantined (see docs/gnubg-protocol.md); flip it off
    # once all three gates in validate_gnubg.py pass here.
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gnubg
        run: |
          sudo apt-get update
          sudo apt-get install -y gnubg
          gnubg --version || true

      - name: Install Sage (for the smoke-match gate)
        run: |
          python -m pip install --upgrade pip
          pip install bgsage

      - name: Capture protocol ground truth (probe)
        # Self-launches and tears down its own external server. Never fails the
        # job — it exists to record real request/response in the CI logs.
        run: python scripts/gnubg_probe.py || true

      - name: Start external server and run the GNUbg gates
        run: |
          printf 'external localhost:8888\n' | gnubg -t -q &
          sleep 3
          python validate_gnubg.py

      - name: Run contender round-robin (Sage vs GNUbg vs Heuristic)
        run: |
          printf 'external localhost:8888\n' | gnubg -t -q &
          sleep 3
          python run_contenders.py
